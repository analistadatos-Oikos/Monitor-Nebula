<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Argus Node · GitHub Client</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f6f8ff;color:#0f1736;padding:20px}
    .card{background:#fff;border:1px solid #dfe6fb;border-radius:10px;padding:14px;margin-bottom:12px}
    .row{display:flex;gap:8px;flex-wrap:wrap}
    input,select,button{height:34px;padding:0 10px;border:1px solid #ccd7fb;border-radius:8px}
    button{cursor:pointer;background:#3556d6;color:#fff;border-color:#3556d6}
    pre{background:#0b1020;color:#e2e8ff;padding:12px;border-radius:8px;overflow:auto}
    .kpi{font-size:24px;font-weight:700}
  </style>
</head>
<body>
  <div class="card">
    <h2>Argus Node desde GitHub Pages</h2>
    <div class="row">
      <button onclick="cargarDashboard()">Cargar Dashboard</button>
    </div>
    <div style="margin-top:10px">
      <div>Total llamadas: <span class="kpi" id="kTotal">-</span></div>
      <div>Efectividad: <span id="kEff">-</span></div>
      <div>Atendidas: <span id="kAns">-</span></div>
    </div>
  </div>

  <div class="card">
    <h3>Probar Proxy</h3>
    <div class="row">
      <input id="url" style="min-width:420px" value="https://api.github.com/repos/octocat/Hello-World" />
      <button onclick="probarProxy()">Llamar Proxy</button>
    </div>
    <pre id="out">Sin datos</pre>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyu2xRKnegY2nUFh7RkqXFJWfjRxoSEEkpd7M9x2tyzxaufl0-_FpaZ_lQT6M4CdW75/exec";

    function gasJsonp(params = {}) {
      return new Promise((resolve, reject) => {
        const cb = "__cb_" + Date.now() + "_" + Math.floor(Math.random() * 1e6);
        params.callback = cb;

        const q = new URLSearchParams(params).toString();
        const src = GAS_URL + "?" + q;
        const s = document.createElement("script");

        let done = false;
        const clean = () => {
          if (done) return;
          done = true;
          delete window[cb];
          s.remove();
        };

        window[cb] = (data) => { clean(); resolve(data); };
        s.onerror = () => { clean(); reject(new Error("JSONP error")); };

        s.src = src;
        document.body.appendChild(s);

        setTimeout(() => {
          if (!done) { clean(); reject(new Error("Timeout JSONP")); }
        }, 15000);
      });
    }

    async function cargarDashboard() {
      try {
        const res = await gasJsonp({ action: "dashboard" });
        if (!res.success) throw new Error(res.error || "Error dashboard");
        document.getElementById("kTotal").textContent = res.resumen?.total ?? "-";
        document.getElementById("kEff").textContent   = (res.resumen?.eff ?? "-") + "%";
        document.getElementById("kAns").textContent   = res.resumen?.answered ?? "-";
      } catch (e) {
        alert("Error: " + e.message);
      }
    }

    async function probarProxy() {
      const url = document.getElementById("url").value.trim();
      const out = document.getElementById("out");
      out.textContent = "Consultando...";
      try {
        const res = await gasJsonp({
          action: "proxy",
          method: "GET",
          url: url
        });
        out.textContent = JSON.stringify(res, null, 2);
      } catch (e) {
        out.textContent = "Error: " + e.message;
      }
    }
  </script>
</body>
</html>
