<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Argus Node · CDR</title>
  <style>
    :root{
      --bg:#040507;
      --panel:#0b0f16;
      --line:#1a2433;
      --txt:#eaf1ff;
      --muted:#90a0bc;
      --brand:#3f57d5;
      --brand2:#00b7ff;
      --ok:#1fd08a;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      background: var(--bg);
      color: var(--txt);
      font-family: "Outfit","Segoe UI",system-ui,sans-serif;
      overflow:hidden;
    }

    /* App frame */
    #app{
      position:fixed; inset:0;
      background:#000;
      opacity:0;
      transition:opacity .5s ease;
    }
    #app.show{opacity:1}
    #app iframe{
      width:100%;
      height:100%;
      border:none;
      background:#000;
    }

    /* Intro */
    #intro{
      position:fixed; inset:0;
      display:grid; place-items:center;
      background:
        radial-gradient(900px 500px at 80% -10%, rgba(63,87,213,.24), transparent 60%),
        radial-gradient(700px 450px at 10% 110%, rgba(0,183,255,.12), transparent 60%),
        #040507;
      z-index:20;
      transition:opacity .55s ease, visibility .55s ease;
    }
    #intro.hide{opacity:0; visibility:hidden}

    .card{
      width:min(900px,92vw);
      border:1px solid var(--line);
      border-radius:24px;
      background:linear-gradient(180deg,#0e131b,#090d14);
      box-shadow:0 30px 80px rgba(0,0,0,.55);
      padding:34px 28px;
      display:grid;
      grid-template-columns:280px 1fr;
      gap:24px;
      align-items:center;
    }

    .phone-wrap{
      position:relative;
      height:230px;
      display:grid;
      place-items:center;
      border:1px solid var(--line);
      border-radius:18px;
      background:linear-gradient(180deg,#0a0f17,#0a0d13);
      overflow:hidden;
    }
    .ring,.ring2,.ring3{
      position:absolute; border-radius:50%;
      border:1px solid rgba(63,87,213,.32);
      animation:pulse 1.8s infinite;
    }
    .ring{width:110px;height:110px}
    .ring2{width:150px;height:150px; animation-delay:.25s; border-color:rgba(0,183,255,.25)}
    .ring3{width:190px;height:190px; animation-delay:.5s; border-color:rgba(63,87,213,.14)}
    @keyframes pulse{
      0%{transform:scale(.85);opacity:.2}
      50%{opacity:1}
      100%{transform:scale(1.15);opacity:.1}
    }

    .phone{
      width:88px;height:88px;border-radius:20px;
      display:grid;place-items:center;
      background:linear-gradient(180deg,#111b2b,#0d1422);
      border:1px solid #2a3a54;
      box-shadow:0 10px 30px rgba(63,87,213,.35);
      animation:shake 1.2s infinite;
      transform-origin:70% 80%;
      z-index:2;
    }
    .phone svg{width:42px;height:42px;fill:#74c9ff}
    @keyframes shake{
      0%,100%{transform:rotate(0)}
      20%{transform:rotate(9deg)}
      40%{transform:rotate(-8deg)}
      60%{transform:rotate(7deg)}
      80%{transform:rotate(-5deg)}
    }

    .kicker{
      color:#8ca0c8;
      font-size:.78rem;
      text-transform:uppercase;
      letter-spacing:.14em;
      margin-bottom:8px;
    }
    h1{
      font-size:clamp(1.6rem,3vw,2.5rem);
      line-height:1.06;
      letter-spacing:-.02em;
      margin-bottom:11px;
    }
    .grad{
      background:linear-gradient(90deg,var(--brand),var(--brand2));
      -webkit-background-clip:text;background-clip:text;color:transparent;
    }
    p{
      color:var(--muted);
      line-height:1.6;
      margin-bottom:16px;
      max-width:58ch;
    }

    .status{
      display:flex;align-items:center;gap:10px;
      font-size:.92rem;font-weight:600;
      color:#cedbfb;
      margin-bottom:10px;
    }
    .dot{
      width:9px;height:9px;border-radius:50%;
      background:var(--ok);
      box-shadow:0 0 0 0 rgba(31,208,138,.5);
      animation:live 1.5s infinite;
    }
    @keyframes live{
      0%,100%{box-shadow:0 0 0 0 rgba(31,208,138,.5)}
      50%{box-shadow:0 0 0 8px rgba(31,208,138,0)}
    }

    .bar{
      width:min(520px,100%);
      height:8px;border-radius:999px;
      background:#151d2a;
      border:1px solid #223148;
      overflow:hidden;
    }
    .bar > span{
      display:block;height:100%;width:0%;
      background:linear-gradient(90deg,var(--brand),var(--brand2));
      animation:load 3.2s linear forwards;
    }
    @keyframes load{to{width:100%}}

    .mini{
      margin-top:9px;
      color:#70809f;
      font-size:.78rem;
      letter-spacing:.03em;
    }

    @media (max-width:860px){
      .card{grid-template-columns:1fr; padding:22px}
      .right{text-align:center}
      p{max-width:100%}
    }
  </style>
</head>
<body>
  <section id="intro">
    <div class="card">
      <div class="phone-wrap">
        <div class="ring"></div>
        <div class="ring2"></div>
        <div class="ring3"></div>
        <div class="phone" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M6.6 10.8c1.6 3.1 3.5 5 6.6 6.6l2.2-2.2c.3-.3.8-.4 1.2-.3 1.3.4 2.7.6 4.1.6.7 0 1.3.6 1.3 1.3V21c0 .7-.6 1.3-1.3 1.3C10.8 22.3 1.7 13.2 1.7 2.3 1.7 1.6 2.3 1 3 1h4.2c.7 0 1.3.6 1.3 1.3 0 1.4.2 2.8.6 4.1.1.4 0 .9-.3 1.2l-2.2 2.2z"/>
          </svg>
        </div>
      </div>

      <div class="right">
        <div class="kicker">Argus Node</div>
        <h1>Central de <span class="grad">Comunicaciones CDR</span></h1>
        <p>Inicializando monitoreo y analítica en tiempo real. Cargando panel operativo.</p>

        <div class="status"><span class="dot"></span><span>Preparando entorno</span></div>
        <div class="bar"><span></span></div>
        <div class="mini">Cargando interfaz...</div>
      </div>
    </div>
  </section>

  <main id="app">
    <iframe id="argusFrame" title="Argus Node"></iframe>
  </main>

  <script>
    const ARGUS_URL = "https://script.google.com/macros/s/AKfycbyu2xRKnegY2nUFh7RkqXFJWfjRxoSEEkpd7M9x2tyzxaufl0-_FpaZ_lQT6M4CdW75/exec";
    const intro = document.getElementById("intro");
    const app = document.getElementById("app");
    const frame = document.getElementById("argusFrame");

    // Carga en el mismo GitHub Page (embebido)
    setTimeout(() => {
      frame.src = ARGUS_URL;
      intro.classList.add("hide");
      app.classList.add("show");
    }, 3400);
  </script>
</body>
</html>
