<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Argus Node · Intro</title>
  <style>
    :root{
      --bg:#050505;
      --panel:#0f0f10;
      --line:#22242a;
      --text:#f5f7ff;
      --muted:#a6adbb;
      --brand:#4f7cff;
      --brand2:#00c2ff;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: radial-gradient(1200px 800px at 80% -10%, #1a1a1f 0%, transparent 50%), var(--bg);
      color:var(--text);
      min-height:100vh;
      display:grid;
      place-items:center;
      overflow:hidden;
    }
    .wrap{
      width:min(920px,92vw);
      background:linear-gradient(180deg,#111216,#0c0d10);
      border:1px solid var(--line);
      border-radius:22px;
      padding:28px;
      box-shadow:0 25px 70px rgba(0,0,0,.45);
      display:grid;
      grid-template-columns:280px 1fr;
      gap:24px;
    }
    .avatar-card{
      background:#0a0b0d;
      border:1px solid var(--line);
      border-radius:18px;
      padding:18px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:14px;
    }
    .avatar{
      width:150px;height:150px;border-radius:50%;
      background:radial-gradient(circle at 35% 30%, #6ea1ff 0%, #335dff 45%, #1b2f72 100%);
      position:relative;
      box-shadow:0 0 0 8px #131826, 0 10px 35px rgba(79,124,255,.35);
    }
    .face{
      position:absolute; inset:24px; border-radius:50%;
      background:linear-gradient(180deg,#ffd8b5,#f5b989);
    }
    .eye{position:absolute;top:62px;width:10px;height:10px;border-radius:50%;background:#1f2333}
    .eye.left{left:53px}.eye.right{right:53px}
    .smile{
      position:absolute;left:50%;top:90px;transform:translateX(-50%);
      width:34px;height:16px;border:3px solid #a9483c;border-top:none;border-radius:0 0 16px 16px;
    }
    .headset{
      position:absolute;inset:10px;border:5px solid #d6e1ff;border-bottom:none;border-radius:90px 90px 0 0;
    }
    .mic{
      position:absolute;right:23px;top:95px;width:34px;height:4px;background:#d6e1ff;border-radius:4px;transform:rotate(-18deg);
    }
    .mic::after{
      content:"";position:absolute;right:-6px;top:-4px;width:11px;height:11px;border-radius:50%;background:#d6e1ff;
    }

    .status{
      font-size:.84rem;color:#d7def1;background:#151a26;border:1px solid #252f4a;
      border-radius:999px;padding:7px 12px;
    }

    .content{
      display:flex;flex-direction:column;justify-content:center;
    }
    h1{
      font-size:clamp(1.5rem,3vw,2.4rem);
      line-height:1.1;
      letter-spacing:-.02em;
      margin-bottom:10px;
    }
    .grad{
      background:linear-gradient(90deg,var(--brand),var(--brand2));
      -webkit-background-clip:text;background-clip:text;color:transparent;
    }
    p{
      color:var(--muted);
      font-size:1.02rem;
      line-height:1.6;
      margin-bottom:22px;
      max-width:54ch;
    }
    .actions{display:flex;gap:10px;flex-wrap:wrap}
    .btn{
      border:none;cursor:pointer;border-radius:12px;
      padding:11px 16px;font-weight:700;font-size:.92rem;
    }
    .btn-main{
      color:white;
      background:linear-gradient(90deg,var(--brand),#5e8bff);
      box-shadow:0 8px 24px rgba(79,124,255,.35);
    }
    .btn-main:hover{filter:brightness(1.06)}
    .mini{margin-top:10px;color:#7c8598;font-size:.82rem}
    .loader{
      margin-top:14px;height:3px;width:240px;background:#1a1f2d;border-radius:99px;overflow:hidden;display:none;
    }
    .loader > span{
      display:block;height:100%;width:0;background:linear-gradient(90deg,var(--brand),var(--brand2));
      animation:load 2.4s linear forwards;
    }
    @keyframes load{to{width:100%}}

    @media (max-width: 840px){
      .wrap{grid-template-columns:1fr;padding:20px}
      .avatar-card{padding:20px}
      .content{text-align:center;align-items:center}
      .actions{justify-content:center}
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="avatar-card">
      <div class="avatar" aria-hidden="true">
        <div class="headset"></div>
        <div class="face"></div>
        <span class="eye left"></span>
        <span class="eye right"></span>
        <span class="smile"></span>
        <span class="mic"></span>
      </div>
      <div class="status">Asistente Argus en línea</div>
    </section>

    <section class="content">
      <h1>Hola, bienvenido a <span class="grad">Argus Node</span></h1>
      <p>
        Soy tu asistente virtual de monitoreo telefónico. En segundos te llevo al dashboard principal
        para ver métricas, análisis y reportes.
      </p>

      <div class="actions">
        <button class="btn btn-main" id="goBtn">Entrar a Argus</button>
      </div>

      <div class="loader" id="loader"><span></span></div>
      <div class="mini">Iniciando experiencia...</div>
    </section>
  </main>

  <script>
    const ARGUS_URL = "https://script.google.com/macros/s/AKfycbyu2xRKnegY2nUFh7RkqXFJWfjRxoSEEkpd7M9x2tyzxaufl0-_FpaZ_lQT6M4CdW75/exec";
    const goBtn = document.getElementById("goBtn");
    const loader = document.getElementById("loader");

    function goArgus(){
      loader.style.display = "block";
      goBtn.disabled = true;
      goBtn.textContent = "Abriendo Argus...";
      setTimeout(() => { window.location.href = ARGUS_URL; }, 900);
    }

    goBtn.addEventListener("click", goArgus);

    // Auto-redirección (opcional)
    setTimeout(goArgus, 3500);
  </script>
</body>
</html>
