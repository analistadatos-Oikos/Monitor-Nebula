<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Argus Node · Intro</title>
  <style>
    :root{
      --bg:#050608;
      --panel:#0d1016;
      --line:#1d2330;
      --txt:#ecf1ff;
      --muted:#9aa6bf;
      --brand:#3f57d5;
      --brand2:#00b7ff;
      --ok:#23d18b;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family: "Outfit","Segoe UI",system-ui,sans-serif;
      background:
        radial-gradient(900px 500px at 80% -10%, rgba(63,87,213,.20), transparent 60%),
        radial-gradient(700px 400px at 10% 110%, rgba(0,183,255,.12), transparent 60%),
        var(--bg);
      color:var(--txt);
      overflow:hidden;
      display:grid;
      place-items:center;
    }

    .stage{
      width:min(980px,94vw);
      border:1px solid var(--line);
      background:linear-gradient(180deg,#0f131b,#0a0d14);
      border-radius:24px;
      box-shadow:0 30px 80px rgba(0,0,0,.5);
      display:grid;
      grid-template-columns:320px 1fr;
      gap:22px;
      padding:24px;
    }

    .left{
      border:1px solid var(--line);
      border-radius:18px;
      background:linear-gradient(180deg,#0b1018,#0a0d13);
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      min-height:340px;
      overflow:hidden;
    }

    .waves{
      position:absolute;
      width:260px;height:260px;border-radius:50%;
      border:1px solid rgba(63,87,213,.25);
      animation:pulse 2.4s infinite;
    }
    .waves::before,.waves::after{
      content:"";
      position:absolute;inset:-18px;border-radius:50%;
      border:1px solid rgba(0,183,255,.18);
    }
    .waves::after{inset:-36px;border-color:rgba(63,87,213,.12)}
    @keyframes pulse{
      0%,100%{transform:scale(1);opacity:.75}
      50%{transform:scale(1.06);opacity:1}
    }

    .avatar-wrap{
      width:190px;height:190px;position:relative;
      animation:float 2.6s ease-in-out infinite;
      z-index:2;
    }
    @keyframes float{
      0%,100%{transform:translateY(0)}
      50%{transform:translateY(-8px)}
    }

    .head{
      position:absolute;left:50%;top:20px;transform:translateX(-50%);
      width:132px;height:132px;border-radius:50%;
      background:linear-gradient(180deg,#ffd8b8,#efb287);
      box-shadow:inset 0 -6px 16px rgba(0,0,0,.08);
    }

    .hair{
      position:absolute;left:50%;top:14px;transform:translateX(-50%);
      width:138px;height:72px;border-radius:72px 72px 42px 42px;
      background:linear-gradient(180deg,#1d2435,#111827);
      z-index:2;
    }

    .eye{
      position:absolute;top:72px;width:10px;height:10px;border-radius:50%;
      background:#1b2333;z-index:3;
      animation:blink 4s infinite;
      transform-origin:center;
    }
    .eye.l{left:63px}
    .eye.r{right:63px}
    @keyframes blink{
      0%,44%,48%,100%{transform:scaleY(1)}
      46%{transform:scaleY(.08)}
    }

    .mouth{
      position:absolute;left:50%;top:103px;transform:translateX(-50%);
      width:28px;height:14px;border:3px solid #a84a3b;border-top:none;
      border-radius:0 0 14px 14px;z-index:3;
      animation:talk 1s infinite;
    }
    @keyframes talk{
      0%,100%{height:12px}
      50%{height:7px}
    }

    .headset{
      position:absolute;left:50%;top:30px;transform:translateX(-50%);
      width:154px;height:92px;border:6px solid #dce7ff;border-bottom:none;
      border-radius:90px 90px 0 0;z-index:4;
    }
    .ear{
      position:absolute;top:74px;width:22px;height:34px;border-radius:10px;
      background:#dce7ff;z-index:4;
    }
    .ear.l{left:21px}
    .ear.r{right:21px}

    .mic{
      position:absolute;right:20px;top:112px;width:42px;height:4px;
      background:#dce7ff;border-radius:4px;transform:rotate(-18deg);z-index:4;
    }
    .mic::after{
      content:"";position:absolute;right:-6px;top:-4px;width:11px;height:11px;border-radius:50%;background:#dce7ff;
    }

    .phone{
      position:absolute;right:16px;bottom:22px;z-index:5;
      width:42px;height:42px;border-radius:12px;
      border:1px solid #2a3448;
      background:linear-gradient(180deg,#131a28,#0d1320);
      display:grid;place-items:center;
      animation:ring 1.1s infinite;
      transform-origin:70% 80%;
    }
    .phone svg{width:20px;height:20px;fill:#71c6ff}
    @keyframes ring{
      0%,100%{transform:rotate(0deg)}
      20%{transform:rotate(12deg)}
      40%{transform:rotate(-10deg)}
      60%{transform:rotate(8deg)}
      80%{transform:rotate(-6deg)}
    }

    .right{
      display:flex;flex-direction:column;justify-content:center;
      padding:10px 8px;
    }
    .kicker{
      color:#8ca0c8;font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px;
    }
    h1{
      font-size:clamp(1.7rem,3.2vw,2.6rem);
      line-height:1.05;letter-spacing:-.02em;margin-bottom:12px;
    }
    .grad{
      background:linear-gradient(90deg,var(--brand),var(--brand2));
      -webkit-background-clip:text;background-clip:text;color:transparent;
    }
    p{
      max-width:58ch;
      color:var(--muted);
      line-height:1.6;
      margin-bottom:18px;
      font-size:1.02rem;
    }

    .loading{
      display:flex;align-items:center;gap:10px;
      color:#c8d4f1;font-size:.9rem;font-weight:600;margin-bottom:10px;
    }
    .dot{
      width:9px;height:9px;border-radius:50%;background:var(--ok);
      box-shadow:0 0 0 0 rgba(35,209,139,.55);
      animation:live 1.6s infinite;
    }
    @keyframes live{
      0%,100%{box-shadow:0 0 0 0 rgba(35,209,139,.55)}
      50%{box-shadow:0 0 0 8px rgba(35,209,139,0)}
    }

    .bar{
      width:min(520px,90%);
      height:8px;border-radius:999px;
      background:#151d2c;border:1px solid #222d42;overflow:hidden;
    }
    .bar > span{
      display:block;height:100%;width:0%;
      background:linear-gradient(90deg,var(--brand),var(--brand2));
      animation:progress 3.6s linear forwards;
    }
    @keyframes progress{to{width:100%}}

    .mini{
      margin-top:10px;
      color:#73819d;
      font-size:.78rem;
      letter-spacing:.03em;
    }

    @media (max-width:900px){
      .stage{grid-template-columns:1fr;padding:18px}
      .right{text-align:center;align-items:center}
      p{max-width:100%}
    }
  </style>
</head>
<body>
  <main class="stage">
    <section class="left">
      <div class="waves"></div>

      <div class="avatar-wrap">
        <div class="hair"></div>
        <div class="head"></div>
        <span class="eye l"></span>
        <span class="eye r"></span>
        <span class="mouth"></span>
        <div class="headset"></div>
        <span class="ear l"></span>
        <span class="ear r"></span>
        <span class="mic"></span>

        <div class="phone" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M6.6 10.8c1.6 3.1 3.5 5 6.6 6.6l2.2-2.2c.3-.3.8-.4 1.2-.3 1.3.4 2.7.6 4.1.6.7 0 1.3.6 1.3 1.3V21c0 .7-.6 1.3-1.3 1.3C10.8 22.3 1.7 13.2 1.7 2.3 1.7 1.6 2.3 1 3 1h4.2c.7 0 1.3.6 1.3 1.3 0 1.4.2 2.8.6 4.1.1.4 0 .9-.3 1.2l-2.2 2.2z"/>
          </svg>
        </div>
      </div>
    </section>

    <section class="right">
      <div class="kicker">Argus Node</div>
      <h1>Central de <span class="grad">Comunicaciones</span> CDR</h1>
      <p>Preparando entorno de monitoreo y análisis en tiempo real. En breve ingresarás al panel principal.</p>

      <div class="loading">
        <span class="dot"></span>
        <span>Inicializando sistema</span>
      </div>

      <div class="bar"><span></span></div>
      <div class="mini">Cargando interfaz operativa...</div>
    </section>
  </main>

  <script>
    const ARGUS_URL = "https://script.google.com/macros/s/AKfycbyu2xRKnegY2nUFh7RkqXFJWfjRxoSEEkpd7M9x2tyzxaufl0-_FpaZ_lQT6M4CdW75/exec";
    setTimeout(() => {
      window.location.replace(ARGUS_URL);
    }, 3800);
  </script>
</body>
</html>
